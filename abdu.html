<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>البث المباشر</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0f1115;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:900px;
background:#161a22;
border-radius:18px;
padding:15px;
box-shadow:0 0 25px rgba(0,255,255,0.08);
}

.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
}

.live-dot{
width:12px;
height:12px;
background:#00f7ff;
border-radius:50%;
box-shadow:0 0 10px #00f7ff;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

.live-text{
color:#00f7ff;
font-weight:bold;
letter-spacing:1px;
}

.muted{
font-size:13px;
color:#aaa;
}

.video-box{
position:relative;
overflow:hidden;
border-radius:14px;
border:1px solid rgba(0,255,255,.2);
}

.video-box iframe{
width:100%;
height:480px;
border:none;
background:black;
}

.overlay{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,.5);
padding:6px 10px;
border-radius:10px;
display:flex;
align-items:center;
gap:6px;
backdrop-filter:blur(4px);
}

.no-audio{
display:flex;
align-items:center;
gap:6px;
font-size:13px;
color:#bbb;
}

.no-audio svg{
width:16px;
height:16px;
fill:#00f7ff;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="live-dot"></div>
<div class="live-text">LIVE</div>
<div class="muted">بث مباشر بدون صوت</div>
</div>

<div class="video-box">

<div class="overlay">
<div class="live-dot"></div>
<span>بث مباشر</span>
</div>

<iframe 
src="http://172.18.26.26:8080"
allowfullscreen>
</iframe>

</div>

</div>

</body>
</html>
